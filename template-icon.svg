<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15212E"/>
      <stop offset="100%" stop-color="#0B131B"/>
    </linearGradient>
    <linearGradient id="ghost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C3FC5"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Subtle glow behind ghost -->
  <circle cx="400" cy="380" r="140" fill="url(#glow)" opacity="0.08"/>
  <circle cx="400" cy="380" r="100" fill="url(#glow)" opacity="0.06"/>
  <!-- Ghost body -->
  <g transform="translate(400,380)">
    <!-- Main ghost shape - rounded head flowing into body with wavy bottom -->
    <path d="M-90,-100 C-90,-160 -50,-190 0,-190 C50,-190 90,-160 90,-100 L90,80 C90,100 70,110 60,90 C50,70 40,90 30,70 C20,50 10,70 0,50 C-10,70 -20,50 -30,70 C-40,90 -50,70 -60,90 C-70,110 -90,100 -90,80 Z" fill="url(#ghost)" opacity="0.92"/>
    <!-- Eyes -->
    <ellipse cx="-30" cy="-80" rx="12" ry="16" fill="#15212E" opacity="0.85"/>
    <ellipse cx="30" cy="-80" rx="12" ry="16" fill="#15212E" opacity="0.85"/>
    <!-- Eye shine -->
    <circle cx="-26" cy="-85" r="5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="34" cy="-85" r="5" fill="#FFFFFF" opacity="0.9"/>
    <!-- Subtle cheek blushes -->
    <ellipse cx="-50" cy="-55" rx="10" ry="6" fill="#A78BFA" opacity="0.12"/>
    <ellipse cx="50" cy="-55" rx="10" ry="6" fill="#4ADE80" opacity="0.1"/>
  </g>
  <!-- Decorative accent dots -->
  <circle cx="190" cy="210" r="4" fill="#4ADE80" opacity="0.2"/>
  <circle cx="610" cy="560" r="5" fill="#A78BFA" opacity="0.18"/>
  <circle cx="600" cy="190" r="3" fill="#FFFFFF" opacity="0.12"/>
</svg>